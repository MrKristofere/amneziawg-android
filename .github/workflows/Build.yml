name: Build and Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code with submodules
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-disabled: false
        cache-read-only: false

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build signed release APK
      run: |
        # Создаем временный keystore для подписи
        keytool -genkeypair \
          -v \
          -keystore temporary.keystore \
          -alias androidkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug, O=Android, C=US"
          
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$(pwd)/temporary.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=androidkey \
          -Pandroid.injected.signing.key.password=android

    - name: Find and verify APK
      run: |
        echo "🔍 Поиск APK файлов..."
        find . -name "*.apk" -type f -exec ls -la {} \;
        
        # Ищем release APK
        APK_PATH=$(find . -name "*release*.apk" -type f | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "❌ Release APK не найден!"
          exit 1
        fi
        
        echo "✅ Найден APK: $APK_PATH"
        
        # Проверяем подпись APK
        echo "🔐 Проверка подписи APK..."
        apksigner verify --verbose "$APK_PATH" || echo "Предупреждение: apksigner не установлен"
        
        # Переименовываем
        mv "$APK_PATH" "amneziawg-android-signed.apk"
        echo "📦 APK подготовлен: amneziawg-android-signed.apk"

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v7
      with:
        name: amneziawg-android-signed
        path: amneziawg-android-signed.apk
        retention-days: 30

    - name: Get version from tag
      if: startsWith(github.ref, 'refs/tags/')
      id: get_version
      run: |
        if [[ ${{ github.ref }} == refs/tags/* ]]; then
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG_NAME" >> $GITHUB_ENV
        else
          echo "TAG=v${{ github.run_number }}" >> $GITHUB_ENV
        fi

    - name: Create Release (only on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: ncipollo/release-action@v1
      with:
        artifacts: "amneziawg-android-signed.apk"
        tag: "${{ env.TAG }}"
        name: "AmneziaWG Android ${{ env.TAG }}"
        body: |
          ## 📱 Подписанная версия AmneziaWG Android
          **ВАЖНО**: Этот APK подписан временным ключом для тестирования.
        draft: false
        prerelease: false
        allowUpdates: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
